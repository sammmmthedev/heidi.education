<!DOCTYPE html>
<html>
<head>
<title>Page Selector</title>

<style>
body {
    background-image: url("../cows.png");
    background-repeat: repeat;
    margin: 0;
    font-family: Arial, sans-serif;
}

.content-box {
    background-color: white;
    width: 800px;
    margin: 50px auto;
    padding: 20px;
    border: 3px solid black;
    text-align: center;
}

.button-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

button {
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
    border: 2px solid black;
    background-color: #f0f0f0;
}

button:hover {
    background-color: #ddd;
}
</style>

<script>
function buttonPressed(page) {
    var audio = new Audio("../click.mp3");
    audio.play();

    setTimeout(function() {
        window.location.href = page;
    }, 300);
}
</script>

</head>
<body>

<div class="content-box">
    <h1>Page Selector</h1>
    <p>Select a page below:</p>

    <div class="button-grid">
        <button onclick="buttonPressed('../index.html')">Main Page</button>
        <button onclick="buttonPressed('page2.html')">Page 2</button>
        <button onclick="buttonPressed('page3.html')">Page 3</button>
        <button onclick="buttonPressed('page4.html')">Page 4</button>
        <button onclick="buttonPressed('../crazyinf/index.html')">Crazy?</button>
        <button onclick="buttonPressed('page6.html')">Page 6</button>
        <button onclick="buttonPressed('page7.html')">Page 7</button>
        <button onclick="buttonPressed('page8.html')">Page 8</button>
        <button onclick="buttonPressed('page9.html')">Page 9</button>
        <button onclick="buttonPressed('page10.html')">Page 10</button>
    </div>

</div>

</body>
</html>
